<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · iDesign Studio</title>
<link rel="stylesheet" href="studio.css?v=2">
<style>
  .login-card{width:100%;max-width:430px;padding:38px 34px 30px}
  .login-head{text-align:center;margin-bottom:26px}
  .login-head .tag{color:var(--sub);font-size:14px;margin-top:14px;line-height:1.5}
  .divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:18px 0}
  .divider::before,.divider::after{content:"";height:1px;background:var(--line);flex:1}
  .forgot{display:block;text-align:right;font-size:12.5px;font-weight:700;margin:-6px 0 18px}
  .foot{text-align:center;color:var(--muted);font-size:11.5px;margin-top:24px}
  .foot .pb{text-transform:uppercase;letter-spacing:.06em;font-weight:700}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="center-screen">
  <form class="card login-card" onsubmit="location.href='hub.html';return false">
    <div class="login-head">
      <span class="brand lg" style="justify-content:center">
        <img class="studio-logo" src="Studio-logo-white.svg" alt="iDesign Studio">
        
      </span>
      <div class="tag">One studio for course design, media, and review.</div>
    </div>

    <div class="field"><span class="lbl">Work email</span><input class="input" type="email" placeholder="you@idesignedu.org" autocomplete="username"></div>
    <div class="field"><span class="lbl">Password</span><input class="input" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <a class="forgot" href="#">Forgot password?</a>

    <button type="submit" class="btn primary block">Sign in</button>
    <div class="divider">or</div>
    <button type="button" class="btn outline block" onclick="location.href='hub.html'">Continue with SSO</button>

    <div class="foot">Secure sign-in · <span class="pb">Powered by iDesign</span></div>
  </form>
</div>
</body>
</html>
